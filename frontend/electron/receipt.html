<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 58mm;
      font-family: monospace;
      font-size: 14px;
      margin: 0;
      padding: 6px;
      line-height: 1.3;
    }

    .center {
      text-align: center;
    }

    .line {
      border-top: 1px dashed #000;
      margin: 6px 0;
    }

    /* ❗ FIX: removed flex (POS printers hate flex) */
    .row {
      display: block;
      margin-bottom: 4px;
    }

    b {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const { ipcRenderer } = require("electron");

    ipcRenderer.on("load-receipt", (event, sale) => {
      document.getElementById("app").innerHTML = `

        <div class="center">
          <b>MY STORE</b><br/>
          Official Receipt
        </div>

        <div class="line"></div>

        <div>
          <div>
            ID: ${sale.sale_id}<br/>
            Date: ${new Date().toLocaleDateString()}
          </div>
          <div>
            Payment: ${sale.payment_method}
          </div>
        </div>

        <div class="line"></div>

        ${sale.items
          .map(
            (item) => `
              <div style="margin-bottom:6px;">
                <div><b>${item.name}</b></div>
                <div>
                  ${item.quantity} x ${item.price} = ₱${item.quantity * item.price}
                </div>
              </div>
            `
          )
          .join("")}

        <div class="line"></div>

        <div class="line"></div>

<div>
  <b>TOTAL: ₱${sale.total_amount}</b>
</div>

<div class="center" style="margin-top:10px;">
  Thank you for your purchase!
</div>

<!-- 🔥 FORCE printer to feed paper using REAL content -->
<div>
  <br/>
  <br/>
  <br/>
  <span>.</span><br/>
  <span>.</span><br/>
  <span>.</span><br/>
</div>

        <!-- 🔥 IMPORTANT: prevents printer cutting TOTAL -->
        <div style="height: 50px;"></div>

      `;
    });
  </script>
</body>
</html>
