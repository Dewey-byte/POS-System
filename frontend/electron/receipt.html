<!DOCTYPE html>
<html>
<head>
  <style>
    /* 🔥 PRINT SETUP (CRITICAL FIX) */
    @page {
      margin: 0;
      size: 58mm auto;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 58mm;
      box-sizing: border-box;
      overflow-x: hidden;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      padding: 4mm;
    }

    .center {
      text-align: center;
    }

    .line {
      border-top: 1px dashed #000;
      margin: 6px 0;
    }

    .item {
      margin-bottom: 6px;
    }

    .bold {
      font-weight: bold;
    }

    /* safer than flex for printers */
    .row {
      display: block;
    }

    .footer-space {
      height: 40px;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const { ipcRenderer } = require("electron");

    ipcRenderer.on("load-receipt", (event, sale) => {
      document.getElementById("app").innerHTML = `

        <div class="center">
          <b>MY STORE</b><br/>
          Official Receipt
        </div>

        <div class="line"></div>

        <div>
          <div>ID: ${sale.sale_id}</div>
          <div>Date: ${new Date().toLocaleString()}</div>
          <div>Payment: ${sale.payment_method}</div>
        </div>

        <div class="line"></div>

        ${sale.items
          .map(
            (item) => `
              <div class="item">
                <div class="bold">${item.name}</div>
                <div>
                  ${item.quantity} x ₱${item.price} = ₱${item.quantity * item.price}
                </div>
              </div>
            `
          )
          .join("")}

        <div class="line"></div>

        <div class="bold">
          TOTAL: ₱${sale.total_amount}
        </div>

        <div class="center" style="margin-top:10px;">
          Thank you for your purchase!
        </div>

        <!-- 🔥 FORCE printer to feed paper using REAL content --> 
        <div> 
          
          <br/> 
          <br/> 
          <br/>  
          <span>.
            </span>
            <br/> 
            <span>.
              </span>
              <br/> </div>

      `;
    });
  </script>
</body>
</html>
